name: Security Alerts Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor-security:
    name: Monitor Security Signals
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Run security monitor
        id: security_monitor
        run: |
          python tools/security_alert_monitor.py \
            --base-url https://hllqpmcqs.com \
            --db-name final-ehtics-mcqs \
            --window-minutes 15 \
            --threshold 20
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Security monitor summary
        if: success()
        run: |
          echo "## Security Monitor" >> $GITHUB_STEP_SUMMARY
          echo "✅ Security checks passed" >> $GITHUB_STEP_SUMMARY
          echo "- blocked paths return 404" >> $GITHUB_STEP_SUMMARY
          echo "- admin auto-provision remains disabled" >> $GITHUB_STEP_SUMMARY
          echo "- admin login failure threshold not exceeded" >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub issue alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Security Alert: monitor failed (${new Date().toISOString()})`;
            const body = [
              'Automated security monitor detected a failure.',
              '',
              `- Workflow: ${context.workflow}`,
              `- Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- Commit: ${context.sha}`,
              '',
              'Check for:',
              '- repeated /api/admin/auth/login failures over threshold',
              '- blocked paths returning non-404',
              '- auth config drift (adminAutoProvision/adminConfigured)'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'alert', 'urgent']
            });
