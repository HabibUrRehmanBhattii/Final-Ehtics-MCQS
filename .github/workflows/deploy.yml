name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  pre-release-gate:
    name: Pre-Release Gate
    runs-on: ubuntu-latest
    outputs:
      gate-passed: ${{ job.status == 'success' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -q -r requirements-dev.txt 2>/dev/null || true

      - name: Run pre-release checks (BLOCKING)
        run: |
          echo "Running mandatory pre-release quality gates..."
          python tools/pre_release_check.py
          if [ $? -ne 0 ]; then
            echo "❌ Pre-release checks FAILED. Deployment blocked."
            exit 1
          fi
          echo "✅ All pre-release checks PASSED"

      - name: Report gate status
        run: |
          echo "## Pre-Release Gate Status" >> $GITHUB_STEP_SUMMARY
          echo "✅ **PASSED** - Deployment can proceed" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: pre-release-gate
    if: needs.pre-release-gate.outputs.gate-passed == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ Worker deployed to hllqpmcqs.com" >> $GITHUB_STEP_SUMMARY
          echo "📋 Deployment ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "🕒 Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
