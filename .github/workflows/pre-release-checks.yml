name: Pre-Release Checks

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - main

jobs:
  quality-gate:
    name: Quality & Release Gate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -q -r requirements-dev.txt 2>/dev/null || true

      - name: Run pre-release checks
        run: python tools/pre_release_check.py
        continue-on-error: false

      - name: Run security/session JS checks
        run: node --test tests/worker_helpers.test.js

      - name: Report results
        if: always()
        run: |
          echo "## Pre-Release Checks Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ All quality gates passed" >> $GITHUB_STEP_SUMMARY
